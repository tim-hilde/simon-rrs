name: Daily Simon Digest

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC daily — catches all of previous UTC day
  workflow_dispatch:       # manual trigger for first run / debugging

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # to commit feed.xml back to the repo

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Run summarizer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run python summarize.py

      - name: Commit updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add feed.xml
          # Only commit if feed.xml actually changed
          git diff --staged --quiet || git commit -m "chore: daily digest $(date -u +%Y-%m-%d)"
          git push
